<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Garden — 3D viewer</title>
<style>
  body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; background: #87ceeb; }
  #info { position: absolute; top: 0; left: 0; padding: 12px 16px; background: rgba(0,0,0,0.65); color: white; z-index: 100; line-height: 1.5; max-width: 320px; border-bottom-right-radius: 8px; font-size: 13px; }
  #info b { font-size: 14px; }
  #info small { opacity: 0.75; }
  #presets { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.65); padding: 10px 12px; z-index: 100; border-radius: 6px; }
  #presets h4 { color: #fff; margin: 0 0 8px 0; font-size: 12px; opacity: 0.85; }
  #presets button { display: block; width: 100%; margin: 4px 0; padding: 6px 12px; cursor: pointer; background: #5dade2; color: white; border: none; border-radius: 4px; font-size: 13px; text-align: left; }
  #presets button:hover { background: #3a8fc9; }
  #toggles { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.65); padding: 10px 12px; z-index: 100; color: white; border-radius: 6px; font-size: 12px; }
  #toggles label { display: block; margin: 3px 0; cursor: pointer; }
  #toggles input { margin-right: 6px; }
  #legend { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.65); color: white; padding: 10px 12px; font-size: 11px; z-index: 100; border-radius: 6px; max-width: 220px; }
  #legend .swatch { display: inline-block; width: 14px; height: 14px; vertical-align: middle; margin-right: 6px; border: 1px solid rgba(255,255,255,0.3); }
  #timeBar { position: absolute; top: 100px; left: 12px; background: rgba(0,0,0,0.65); padding: 8px 12px; z-index: 100; color: white; border-radius: 6px; font-size: 12px; max-width: 340px; }
  #timeBar input[type="range"] { width: 200px; vertical-align: middle; }
  #timeBar .lbl-mono { display: inline-block; min-width: 56px; font-family: monospace; }
  #timeBar .seasons { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
  #timeBar .seasons button { background: #444; color: white; border: none; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
  #timeBar .seasons button:hover { background: #5dade2; }
  #timeBar .seasons button.active { background: #5dade2; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(0,0,0,0.85); color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; opacity: 0; transition: opacity 0.15s; z-index: 200; }
</style>
</head>
<body>

<div id="info">
  <b>Garden — 3D visualization</b><br>
  <small>Left mouse: rotate · Right mouse: pan · Scroll: zoom</small><br>
  <small style="opacity:0.85">Other: <a href="editor.html" style="color:#5dade2">2D editor</a> · <a href="zahrada-plan.svg" style="color:#5dade2">2D plan</a></small>
</div>

<div id="presets">
  <h4>VIEW</h4>
  <button onclick="setPreset('iso')">Isometric (SE)</button>
  <button onclick="setPreset('top')">Top-down (plan)</button>
  <button onclick="setPreset('east')">From east (gate)</button>
  <button onclick="setPreset('north')">From north</button>
  <button onclick="setPreset('south')">From south (orchard)</button>
  <button onclick="setPreset('ground')">Walking eye level</button>
  <button onclick="startTour()" style="background:#e07b3b">▶ Walking tour</button>
</div>

<div id="toggles">
  <label><input type="checkbox" id="togglePlot" checked> Fence</label>
  <label><input type="checkbox" id="toggleTrees" checked> Trees</label>
  <label><input type="checkbox" id="toggleRoof" checked> Roof</label>

  <div class="seasons">
    <button data-day="80">Spring (Mar 21)</button>
    <button data-day="172" class="active">Summer (Jun 21)</button>
    <button data-day="265">Autumn (Sep 22)</button>
    <button data-day="355">Winter (Dec 21)</button>
  </div>

  <div><span class="swatch" style="background:#8b6f47"></span>sauna · <span class="swatch" style="background:#5dade2"></span>hot tub</div>
  <div><span class="swatch" style="background:#a87d4a"></span>terraces · <span class="swatch" style="background:#cdc1ad"></span>shelter</div>
  <div><span class="swatch" style="background:#c8a878"></span>pergola · <span class="swatch" style="background:#bdbdbd"></span>driveway</div>
  <div><span class="swatch" style="background:#7a5a3a"></span>raised beds · <span class="swatch" style="background:#5a8a5a"></span>trees</div>
  <div><span class="swatch" style="background:#3a7ab8"></span>rain tank</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ───────────────────────── SCENE ─────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc4d8e8, 0.008);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(22, 0, 17);
controls.maxPolarAngle = Math.PI / 2 - 0.05;
controls.minDistance = 3;
controls.maxDistance = 200;

// ───────────────────────── SKY DOME (procedural gradient) ─────────────────────────
const skyGeom = new THREE.SphereGeometry(400, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    topColor:    { value: new THREE.Color(0x4a8fcf) },
    bottomColor: { value: new THREE.Color(0xc4d8e8) },
    sunPos:      { value: new THREE.Vector3(15, 50, -10).normalize() },
    sunColor:    { value: new THREE.Color(0xffe4b5) },
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 topColor;
    uniform vec3 bottomColor;
    uniform vec3 sunPos;
    uniform vec3 sunColor;
    varying vec3 vWorldPos;
    void main() {
      vec3 dir = normalize(vWorldPos);
      float h = max(0.0, dir.y);
      vec3 sky = mix(bottomColor, topColor, pow(h, 0.6));
      // Sun glow
      float sunDot = max(0.0, dot(dir, sunPos));
      float glow = pow(sunDot, 50.0);
      sky = mix(sky, sunColor, glow * 0.7);
      gl_FragColor = vec4(sky, 1.0);
    }
  `,
  side: THREE.BackSide,
  depthWrite: false,
});
const sky = new THREE.Mesh(skyGeom, skyMat);
scene.add(sky);

// ───────────────────────── LIGHTS ─────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);
const hemi = new THREE.HemisphereLight(0xb1e1ff, 0x386641, 0.4);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff5d0, 1.4);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
const sd = 60;
sun.shadow.camera.left = -sd;
sun.shadow.camera.right = sd;
sun.shadow.camera.top = sd;
sun.shadow.camera.bottom = -sd;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 200;
scene.add(sun);

// Solar position formula (lat 50°N, day-of-year + hour)
// Returns { elev, az } in radians; az measured from N clockwise (compass).
function solarPosition(dayOfYear, hour, latDeg = 50) {
  const lat = latDeg * Math.PI / 180;
  const decl = 23.45 * Math.PI / 180 * Math.sin(2 * Math.PI * (284 + dayOfYear) / 365);
  const H = (hour - 12) * 15 * Math.PI / 180;
  const sinElev = Math.sin(lat) * Math.sin(decl) + Math.cos(lat) * Math.cos(decl) * Math.cos(H);
  const elev = Math.asin(Math.max(-1, Math.min(1, sinElev)));
  // Azimuth from south (positive west)
  const azFromSouth = Math.atan2(
    Math.sin(H),
    Math.cos(H) * Math.sin(lat) - Math.tan(decl) * Math.cos(lat)
  );
  const az = Math.PI + azFromSouth;
  return { elev, az };
}

let currentHour = 14;
let currentDay = 172;  // 21. června default

function updateSun() {
  const { elev, az } = solarPosition(currentDay, currentHour);
  const dist = 100;
  const horizDist = dist * Math.cos(elev);
  const x = horizDist * Math.sin(az);
  const y = dist * Math.sin(elev);
  const z = -horizDist * Math.cos(az);
  sun.position.set(x, Math.max(2, y), z);
  // Below-horizon (night) handling
  if (elev < 0) {
    sun.intensity = 0.05;
    skyMat.uniforms.topColor.value.setHex(0x0a1024);
    skyMat.uniforms.bottomColor.value.setHex(0x1a2144);
    sun.color.setHex(0x6080a0);
    ambient.intensity = 0.15;
  } else {
    const elevDeg = elev * 180 / Math.PI;
    if (elevDeg < 8) {
      // Sunrise/sunset golden
      sun.color.setHex(0xff9560);
      sun.intensity = 0.8;
      skyMat.uniforms.topColor.value.setHex(0x4a4068);
      skyMat.uniforms.bottomColor.value.setHex(0xff9050);
    } else if (elevDeg < 25) {
      // Morning/late afternoon
      sun.color.setHex(0xffd49a);
      sun.intensity = 1.15;
      skyMat.uniforms.topColor.value.setHex(0x5a8fc4);
      skyMat.uniforms.bottomColor.value.setHex(0xffc890);
    } else {
      // Daytime
      sun.color.setHex(0xfff5d0);
      sun.intensity = 1.4;
      skyMat.uniforms.topColor.value.setHex(0x4a8fcf);
      skyMat.uniforms.bottomColor.value.setHex(0xc4d8e8);
    }
    ambient.intensity = 0.3 + Math.min(1, elevDeg / 60) * 0.2;
  }
  skyMat.uniforms.sunPos.value.set(x, y, z).normalize();
  skyMat.uniforms.sunColor.value.copy(sun.color);
  scene.fog.color.setRGB(
    0.7 * skyMat.uniforms.bottomColor.value.r + 0.3,
    0.7 * skyMat.uniforms.bottomColor.value.g + 0.3,
    0.7 * skyMat.uniforms.bottomColor.value.b + 0.3
  );
}
function setSunFromTime(hour) {
  currentHour = hour;
  updateSun();
}
updateSun();

// Axes helper
const axes = new THREE.AxesHelper(5);
axes.visible = false;
scene.add(axes);

// ───────────────────────── TERÉN (svah JZ→SV, 4 m výškový rozdíl) ─────────────────────────
// JZ corner (1.15, 30.41) = nejvýše (y=4), SV corner (44.16, 0) = nejníže (y=0)
// Plane equation: y = -0.062 x + 0.044 z + 2.733
function terrainHeight(x, z) {
  return Math.max(0, -0.062 * x + 0.044 * z + 2.733);
}

// ───────────────────────── HELPERS ─────────────────────────
function makePolyShape(verts2d) {
  const shape = new THREE.Shape();
  shape.moveTo(verts2d[0][0], -verts2d[0][1]);
  for (let i = 1; i < verts2d.length; i++) {
    shape.lineTo(verts2d[i][0], -verts2d[i][1]);
  }
  shape.closePath();
  return shape;
}

// Box on terrain
function addBox(plotX, plotY, w, d, h, color, opts = {}) {
  const cx = plotX + w/2;
  const cz = plotY + d/2;
  const baseY = opts.skipTerrain ? 0 : terrainHeight(cx, cz);
  const yOffset = opts.yOffset ?? 0;
  const geom = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({
    color,
    transparent: opts.opacity !== undefined,
    opacity: opts.opacity ?? 1,
    roughness: opts.roughness ?? 0.7,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(cx, baseY + h/2 + yOffset, cz);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// Extruded polygon (dům) — osazený na terénu dle centroidu
function addExtrudedPoly(verts2d, h, color) {
  const shape = makePolyShape(verts2d);
  const geom = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: false });
  geom.rotateX(-Math.PI / 2);
  let cx = 0, cz = 0;
  for (const v of verts2d) { cx += v[0]; cz += v[1]; }
  cx /= verts2d.length; cz /= verts2d.length;
  geom.translate(0, terrainHeight(cx, cz), 0);
  const mesh = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({ color, roughness: 0.7 }));
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return { mesh, baseY: terrainHeight(cx, cz) };
}

// Open structure (carport/pergola): střecha + 4 sloupky, na terénu
function addOpenStructure(plotX, plotY, w, d, h, roofColor, postColor = 0x5a3e25, opacity = 0.55) {
  const group = new THREE.Group();
  const cx = plotX + w/2;
  const cz = plotY + d/2;
  const baseY = terrainHeight(cx, cz);
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(w, 0.18, d),
    new THREE.MeshStandardMaterial({ color: roofColor, transparent: true, opacity, roughness: 0.7 })
  );
  roof.position.set(cx, baseY + h, cz);
  roof.castShadow = true;
  group.add(roof);
  for (const [ox, oz] of [[0,0],[w,0],[0,d],[w,d]]) {
    const post = new THREE.Mesh(
      new THREE.BoxGeometry(0.15, h, 0.15),
      new THREE.MeshStandardMaterial({ color: postColor, roughness: 0.6 })
    );
    const pY = terrainHeight(plotX + ox, plotY + oz);
    post.position.set(plotX + ox, pY + h/2, plotY + oz);
    post.castShadow = true;
    group.add(post);
  }
  scene.add(group);
  return group;
}

// Tree (kmen + koruna) na terénu
function addTree(plotX, plotY, height = 4, canopyColor = 0x5a8a5a) {
  const trunkH = height * 0.35;
  const baseY = terrainHeight(plotX, plotY);
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.22, trunkH, 8),
    new THREE.MeshStandardMaterial({ color: 0x6e4f31, roughness: 0.9 })
  );
  trunk.position.set(plotX, baseY + trunkH/2, plotY);
  trunk.castShadow = true;
  treesGroup.add(trunk);

  const canopy = new THREE.Mesh(
    new THREE.SphereGeometry(height * 0.4, 12, 8),
    new THREE.MeshStandardMaterial({ color: canopyColor, roughness: 0.85 })
  );
  canopy.position.set(plotX, baseY + trunkH + height * 0.35, plotY);
  canopy.castShadow = true;
  treesGroup.add(canopy);
}

// Platform (terasa, chodníček) sledující terén — top surface only
function addTerrainPlatform(verts2d, thickness, color, opts = {}) {
  const shape = makePolyShape(verts2d);
  const geom = new THREE.ShapeGeometry(shape);
  geom.rotateX(-Math.PI/2);
  const pos = geom.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);
    pos.setY(i, terrainHeight(x, z) + thickness);
  }
  pos.needsUpdate = true;
  geom.computeVertexNormals();
  const mesh = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({
    color, roughness: opts.roughness ?? 0.7,
    side: THREE.DoubleSide
  }));
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// Fence segment (wall) na terénu
function addFenceSegment(x1, z1, x2, z2, h = 1.8) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.sqrt(dx*dx + dz*dz);
  const angle = Math.atan2(dx, dz);
  const mx = (x1+x2)/2, mz = (z1+z2)/2;
  const baseY = terrainHeight(mx, mz);
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, h, len),
    new THREE.MeshStandardMaterial({ color: 0x8a7a5a, roughness: 0.8, transparent: true, opacity: 0.7 })
  );
  mesh.position.set(mx, baseY + h/2, mz);
  mesh.rotation.y = angle;
  mesh.castShadow = true;
  fenceGroup.add(mesh);
}

const treesGroup = new THREE.Group();
const fenceGroup = new THREE.Group();
const roofGroup = new THREE.Group();
const furnitureGroup = new THREE.Group();
const animatedItems = [];
scene.add(treesGroup);
scene.add(fenceGroup);
scene.add(roofGroup);
scene.add(furnitureGroup);

// Tree variety
function addConifer(plotX, plotY, height = 5) {
  const baseY = terrainHeight(plotX, plotY);
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.25, height * 0.25, 8),
    new THREE.MeshStandardMaterial({ color: 0x5a3e25, roughness: 0.95 })
  );
  trunk.position.set(plotX, baseY + height * 0.125, plotY);
  trunk.castShadow = true;
  treesGroup.add(trunk);
  // 2-3 stacked cones
  for (let i = 0; i < 3; i++) {
    const r = (1 - i * 0.25) * height * 0.35;
    const h = height * 0.4;
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(r, h, 10),
      new THREE.MeshStandardMaterial({ color: 0x355c39, roughness: 0.85 })
    );
    cone.position.set(plotX, baseY + height * 0.25 + i * height * 0.25 + h / 2, plotY);
    cone.castShadow = true;
    treesGroup.add(cone);
  }
}

function addBush(plotX, plotY, size = 1, color = 0x5a8a5a) {
  const baseY = terrainHeight(plotX, plotY);
  // 3-4 overlapping spheres
  const n = 3 + Math.floor(Math.random() * 2);
  for (let i = 0; i < n; i++) {
    const s = size * (0.6 + Math.random() * 0.5);
    const ox = (Math.random() - 0.5) * size * 0.7;
    const oz = (Math.random() - 0.5) * size * 0.7;
    const bush = new THREE.Mesh(
      new THREE.SphereGeometry(s, 10, 7),
      new THREE.MeshStandardMaterial({ color, roughness: 0.85 })
    );
    bush.position.set(plotX + ox, baseY + s * 0.7, plotY + oz);
    bush.castShadow = true;
    treesGroup.add(bush);
  }
}

// ───────────────────────── POZEMEK (GROUND) ─────────────────────────
const plotVerts = [
  [0, 0],            // SZ
  [44.16, 0],        // SV
  [44.16, 23.38],    // E_kink
  [43.11, 35.41],    // JV
  [1.15, 30.41]      // JZ
];
const plotShape = makePolyShape(plotVerts);
const plotGeom = new THREE.ShapeGeometry(plotShape);
plotGeom.rotateX(-Math.PI/2);
// Aplikuj svah na vertex Y
const groundPos = plotGeom.attributes.position;
for (let i = 0; i < groundPos.count; i++) {
  const x = groundPos.getX(i);
  const z = groundPos.getZ(i);
  groundPos.setY(i, terrainHeight(x, z));
}
groundPos.needsUpdate = true;
plotGeom.computeVertexNormals();

const ground = new THREE.Mesh(
  plotGeom,
  new THREE.MeshStandardMaterial({ color: 0x7eaf6d, roughness: 0.95 })
);
ground.receiveShadow = true;
scene.add(ground);

// ───────────────────────── DŮM ─────────────────────────
const dumVerts = [
  [10.48, 7.18],   // NW
  [21.28, 7.18],   // NE
  [21.28, 11.58],
  [20.58, 11.58],  // E zub start
  [20.58, 22.53],
  [21.28, 22.53],  // E zub end
  [21.28, 26.43],  // SE
  [10.48, 26.43],  // SW
  [10.48, 19.18],
  [14.78, 19.18],  // W zub start
  [14.78, 15.93],
  [10.48, 15.93],  // W zub end
];
const wallH = 2.8;
const roofRise = 5;
addExtrudedPoly(dumVerts, wallH, 0xd4b896);

// Sedlová střecha (sedlový štít na S a J — ridge running E-W is wrong; per studie štít na jih, takže ridge S-N or E-W?)
// Studie: "Dominantní sedlový štít" v jižním pohledu = gable at south face. Ridge runs perpendicular to gable face, tj. ridge S-N.
// Roof over dům bounding box: x = 10.48..21.28, z = 7.18..26.43. Ridge centered along x (peak runs N-S along z).
function makeGableRoof(xMin, xMax, zMin, zMax, wallTop, peakHeight) {
  const xMid = (xMin + xMax) / 2;
  const peakY = wallTop + peakHeight;
  const verts = [
    xMin, wallTop, zMin, // 0
    xMax, wallTop, zMin, // 1
    xMid, peakY,  zMin,  // 2
    xMin, wallTop, zMax, // 3
    xMax, wallTop, zMax, // 4
    xMid, peakY,  zMax,  // 5
  ];
  const indices = [
    0,1,2,        // front gable (z=zMin)
    3,5,4,        // back gable (z=zMax)
    0,3,5, 0,5,2, // left slope
    1,2,5, 1,5,4, // right slope
    // bottom (closes box, optional)
  ];
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geom.setIndex(indices);
  geom.computeVertexNormals();
  return geom;
}

// Roof setup
const dumCentroidX = (10.48 + 21.28) / 2;
const dumCentroidZ = (7.18 + 26.43) / 2;
const dumTerrainY = terrainHeight(dumCentroidX, dumCentroidZ);
const roofMat = new THREE.MeshStandardMaterial({ color: 0xa0a0a0, roughness: 0.5, metalness: 0.3, side: THREE.DoubleSide });

// Pultová střecha — sklon NS (north high, south low)
function makePultRoofNS(xMin, xMax, zMin, zMax, lowY, highY) {
  const verts = [
    xMin, highY, zMin,
    xMax, highY, zMin,
    xMax, lowY,  zMax,
    xMin, lowY,  zMax,
  ];
  const indices = [0, 1, 2, 0, 2, 3];
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geom.setIndex(indices);
  geom.computeVertexNormals();
  return geom;
}
const makePultRoof = makePultRoofNS;  // alias

// Pultová střecha — sklon WE (west low, east high)
function makePultRoofWE(xMin, xMax, zMin, zMax, lowY, highY) {
  const verts = [
    xMin, lowY,  zMin,
    xMax, highY, zMin,
    xMax, highY, zMax,
    xMin, lowY,  zMax,
  ];
  const indices = [0, 1, 2, 0, 2, 3];
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geom.setIndex(indices);
  geom.computeVertexNormals();
  return geom;
}

function dayToDate(d) {
  const md = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let m = 0, day = d;
  while (day > md[m]) { day -= md[m]; m++; }
  return `${mn[m]} ${day}`;
}

  currentHour = v;
  updateSun();
}
function updateDayLabel() {

}

// ───────────────────────── FIRST-PERSON MODE (WASD) ─────────────────────────
const fpState = { active: false, keys: {} };
const fpCamera = camera;
let fpYaw = 0, fpPitch = 0;
const fpSpeed = 0.18;

function lockPointer() {
  renderer.domElement.requestPointerLock();
}

document.getElementById('toggleFP').addEventListener('change', e => {
  fpState.active = e.target.checked;
  if (fpState.active) {
    controls.enabled = false;
    fpCamera.position.set(20, terrainHeight(20, 20) + 1.7, 20);
    lockPointer();
  } else {
    controls.enabled = true;
    document.exitPointerLock();
    setPreset('iso');
  }
});

document.addEventListener('keydown', e => { fpState.keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', e => { fpState.keys[e.key.toLowerCase()] = false; });

document.addEventListener('mousemove', e => {
  if (!fpState.active || document.pointerLockElement !== renderer.domElement) return;
  fpYaw -= e.movementX * 0.002;
  fpPitch -= e.movementY * 0.002;
  fpPitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, fpPitch));
});

function fpUpdate() {
  if (!fpState.active) return;
  const fwd = new THREE.Vector3(Math.sin(fpYaw), 0, Math.cos(fpYaw));
  const right = new THREE.Vector3(Math.cos(fpYaw), 0, -Math.sin(fpYaw));
  if (fpState.keys['w']) fpCamera.position.addScaledVector(fwd, -fpSpeed);
  if (fpState.keys['s']) fpCamera.position.addScaledVector(fwd, fpSpeed);
  if (fpState.keys['a']) fpCamera.position.addScaledVector(right, -fpSpeed);
  if (fpState.keys['d']) fpCamera.position.addScaledVector(right, fpSpeed);
  // Stay above terrain
  const tY = terrainHeight(fpCamera.position.x, fpCamera.position.z);
  fpCamera.position.y = tY + 1.7;
  // Apply look direction
  const lookAt = new THREE.Vector3(
    fpCamera.position.x - Math.sin(fpYaw) * Math.cos(fpPitch),
    fpCamera.position.y + Math.sin(fpPitch),
    fpCamera.position.z - Math.cos(fpYaw) * Math.cos(fpPitch)
  );
  fpCamera.lookAt(lookAt);
}

let tourActive = false;
let tourIndex = 0;
let tourSegStart = 0;
const tourLabel = document.createElement('div');
tourLabel.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:white;padding:8px 16px;border-radius:6px;font-size:14px;z-index:200;pointer-events:none;opacity:0;transition:opacity 0.3s;';
document.body.appendChild(tourLabel);

window.startTour = function() {
  if (tourActive) return;
  tourActive = true;
  tourIndex = 0;
  tourSegStart = clock.getElapsedTime();
  controls.enabled = false;
  document.getElementById('toggleFP').checked = false;
  fpState.active = false;
};

function tourUpdate() {
  if (!tourActive) return;
  const now = clock.getElapsedTime();
  const seg = tourPath[tourIndex];
  const next = tourPath[Math.min(tourIndex + 1, tourPath.length - 1)];
  const elapsed = now - tourSegStart;
  if (elapsed > seg.dur) {
    tourIndex++;
    tourSegStart = now;
    if (tourIndex >= tourPath.length - 1) {
      tourActive = false;
      controls.enabled = true;
      tourLabel.style.opacity = 0;
      return;
    }
  }
  const t = Math.min(1, elapsed / seg.dur);
  const easeT = t * t * (3 - 2 * t);  // smoothstep
  const px = seg.p[0] + (next.p[0] - seg.p[0]) * easeT;
  const pz = seg.p[1] + (next.p[1] - seg.p[1]) * easeT;
  const lax = seg.la[0] + (next.la[0] - seg.la[0]) * easeT;
  const laz = seg.la[1] + (next.la[1] - seg.la[1]) * easeT;
  const py = terrainHeight(px, pz) + 1.7;
  const lay = terrainHeight(lax, laz) + 1.5;
  camera.position.set(px, py, pz);
  camera.lookAt(lax, lay, laz);
  // Show label
  tourLabel.textContent = `${tourIndex + 1}/${tourPath.length - 1} · ${seg.label}`;
  tourLabel.style.opacity = 0.9;
}

// ───────────────────────── ANIMATE ─────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  // Smoke particles rising and fading
  const smokeBaseY = terrainHeight(36, 8);
  for (const p of smokeParticles) {
    const phase = (t * 0.4 + p.userData.phase) % 1;
    p.position.y = smokeBaseY + 0.6 + phase * 4;
    p.position.x = 36 + Math.sin(t + p.userData.phase * 6) * 0.4;
    p.position.z = 8 + Math.cos(t * 0.5 + p.userData.phase * 6) * 0.3;
    p.material.opacity = 0.5 * (1 - phase);
    p.scale.setScalar(1 + phase * 1.5);
  }
  // Subtle wind in tree canopies
  treesGroup.rotation.z = Math.sin(t * 0.5) * 0.005;
  if (fpState.active) fpUpdate();
  tourUpdate();
  controls.update();
  renderer.render(scene, camera);
}
