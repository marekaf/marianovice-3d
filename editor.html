<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
  .toolbar { background: #2a2a2a; color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .toolbar button { background: #5dade2; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .toolbar button:hover { background: #3a8fc9; }
  .toolbar .info { font-size: 13px; opacity: 0.85; }
  .toolbar .coord { background: #444; padding: 4px 10px; border-radius: 4px; font-family: monospace; font-size: 13px; }
  #svgWrap { padding: 20px; display: flex; justify-content: center; }
  svg { background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.1); max-width: 100%; height: auto; }
  .draggable { cursor: move; transition: filter 0.15s; }
  .draggable:hover { filter: drop-shadow(0 0 6px rgba(93, 173, 226, 0.7)); }
  .draggable.dragging { filter: drop-shadow(0 0 8px rgba(255, 100, 0, 0.8)); opacity: 0.85; }

<script>
(function() {
  const SCALE = 18;       // 1 m = 18 px
  const SNAP_M = 2;        // 2 m grid
  const SNAP_PX = SNAP_M * SCALE;

  const svg = document.getElementById('plan');
  const coordEl = document.getElementById('coord');
  const SVGNS = 'http://www.w3.org/2000/svg';

  // Init storage of original positions
  const originals = new Map();
  document.querySelectorAll('.draggable').forEach(g => {
    originals.set(g, getCurrentTranslate(g));
  });

  function getCurrentTranslate(el) {
    const t = el.getAttribute('transform') || '';
    const m = t.match(/translate\(([^,)\s]+)[,\s]+([^)]+)\)/);
    if (m) return { tx: parseFloat(m[1]), ty: parseFloat(m[2]) };
    return { tx: 0, ty: 0 };
  }

  function setTranslate(el, tx, ty) {
    el.setAttribute('transform', `translate(${tx}, ${ty})`);
  }

  function snap(v) {
    return Math.round(v / SNAP_PX) * SNAP_PX;
  }

  // SVG coord transform: client → svg
  function clientToSvg(clientX, clientY) {
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  let dragging = null;

  document.querySelectorAll('.draggable').forEach(g => {
    g.addEventListener('mousedown', e => {
      dragging = {
        el: g,
        startClient: { x: e.clientX, y: e.clientY },
        startTrans: getCurrentTranslate(g)
      };
      g.classList.add('dragging');
      e.preventDefault();
    });
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const startSvg = clientToSvg(dragging.startClient.x, dragging.startClient.y);
    const nowSvg = clientToSvg(e.clientX, e.clientY);
    const dx = nowSvg.x - startSvg.x;
    const dy = nowSvg.y - startSvg.y;
    const newTx = snap(dragging.startTrans.tx + dx);
    const newTy = snap(dragging.startTrans.ty + dy);
    setTranslate(dragging.el, newTx, newTy);
    const dxM = (newTx / SCALE).toFixed(1);
    const dyM = (newTy / SCALE).toFixed(1);
    coordEl.textContent = `${dragging.el.dataset.name}: posun Δ ${dxM} m × ${dyM} m`;
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging.el.classList.remove('dragging');
      dragging = null;
    }
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const clone = svg.cloneNode(true);
    // Strip draggable class for export cleanliness
    clone.querySelectorAll('.draggable').forEach(el => el.classList.remove('draggable'));
    const xml = new XMLSerializer().serializeToString(clone);
    const blob = new Blob([xml], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'zahrada-plan-edited.svg';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    document.querySelectorAll('.draggable').forEach(g => {
      const o = originals.get(g);
      setTranslate(g, o.tx, o.ty);
    });
    coordEl.textContent = '—';
  });
})();
</script>
